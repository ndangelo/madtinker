---
layout: default
title: Tags
permalink: /tag/
---

<h1 id="tag-title">Tag</h1>

<div id="tag-results" class="grid"></div>

<script>
  // Get tag from URL: /tag/code → "code"
  const pathParts = window.location.pathname.split("/");
  const tag = pathParts[pathParts.length - 2];

  const posts = [
    {% for post in site.posts %}
      {
        title: {{ post.title | jsonify }},
        url: {{ post.url | relative_url | jsonify }},
        date: "{{ post.date | date: "%b %d, %Y" }}",
        tags: {{ post.tags | jsonify }},
        image: {{ post.image | relative_url | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  document.getElementById("tag-title").innerText = "Tag: " + tag;

  const container = document.getElementById("tag-results");

  const filtered = posts.filter(post =>
    post.tags && post.tags.includes(tag)
  );

  if (filtered.length === 0) {
    container.innerHTML = "<p>No posts found.</p>";
  } else {
    container.innerHTML = filtered.map(post => `
      <a href="${post.url}" class="card">
        ${post.image ? `<img src="${post.image}" class="card-image">` : `<div class="no-image">No Image</div>`}
        <div class="card-content">
          <div class="card-title">${post.title}</div>
          <div class="card-date">${post.date}</div>
        </div>
      </a>
    `).join("");
  }
</script>
