<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .primary:hover {
      background: #000;
    }

    .secondary {
      background: #e5e7eb;
    }

    .secondary:hover {
      background: #d1d5db;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 70px);
    }

    .panel {
      padding: 24px;
      overflow-y: auto;
    }

    textarea {
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      font-size: 15px;
      line-height: 1.6;
      outline: none;
      background: transparent;
    }

    #preview {
      background: white;
      border-left: 1px solid #e5e7eb;
    }

    #preview h1, #preview h2, #preview h3 {
      margin-top: 1.2em;
    }

    #preview p {
      line-height: 1.7;
      margin: 12px 0;
    }

    #preview code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
    }

    #preview pre {
      background: #111827;
      color: #f9fafb;
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
    }

    .title-input {
      width: 100%;
      border: none;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      outline: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Blog Editor</h1>
  <div class="actions">
    <button class="secondary" onclick="clearEditor()">Clear</button>
    <button class="primary" onclick="download()">Download</button>
  </div>
</header>

<div class="container">
  <div class="panel">
    <input id="title" class="title-input" placeholder="Post Title..." />
    <textarea id="editor" placeholder="Write your post in Markdown..."></textarea>
  </div>
  <div id="preview" class="panel"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const editor = document.getElementById("editor");
  const preview = document.getElementById("preview");
  const title = document.getElementById("title");

  function updatePreview() {
    const content = marked.parse(editor.value);
    const heading = title.value ? `<h1>${title.value}</h1>` : "";
    preview.innerHTML = heading + content;
  }

  editor.addEventListener("input", updatePreview);
  title.addEventListener("input", updatePreview);

  function download() {
    const fileContent = `# ${title.value}\n\n${editor.value}`;
    const blob = new Blob([fileContent], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "blog-post.md";
    a.click();
  }

  function clearEditor() {
    if (confirm("Clear the editor?")) {
      editor.value = "";
      title.value = "";
      updatePreview();
    }
  }
</script>

</body>
</html>
