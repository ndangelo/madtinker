---
layout: default
---

<div class="post">

  <h1>
    Tag:
    <code style="color:#969595; border-color:hsla(0, 0%, 59%,0.6)">
      {{ page.tag }}
    </code>
  </h1>

  <ul>
    {% for post in site.tags[page.tag] %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="date">{{ post.date | date: "%-d %b, %Y" }}</span>
      </li>
    {% endfor %}
  </ul>

</div>

<hr>
