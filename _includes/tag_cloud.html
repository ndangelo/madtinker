<h2>All Tags</h2>

{% assign tags = site.tags | sort %}

{% for tag in tags %}
  {% assign tag_name = tag[0] %}
  {% assign tag_count = tag[1].size %}

  <a href="{{ '/tag/' | append: tag_name | relative_url }}">
    <code style="color:#969595; border-color:hsla(0, 0%, 59%,0.6)">
      {{ tag_name }} ({{ tag_count }})
    </code>
  </a>
{% endfor %}
