---
layout: default
---

<div class="all" id="archives">

  {% for category in site.categories %}

    {% assign category_name = category[0] %}
    {% assign posts = category[1] %}

    <div class="archive-group">

      <!-- FIX: correct id + slugify -->
      <h2 id="{{ category_name | slugify }}" class="category-head">
        {{ category_name }}
      </h2>

      {% for post in posts %}
        <article class="archive-item">
          <h4>
            <a href="{{ post.url | relative_url }}">
              {{ post.title }}
            </a>
          </h4>
        </article>
      {% endfor %}

    </div>

  {% endfor %}

</div>
